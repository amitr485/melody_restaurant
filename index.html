<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסעדת מלודי | דף הבית</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        /* העיצוב המקורי נשמר */
        :root { --gold: #d4af37; --dark-bg: #121212; --light-text: #f4f4f4; --gray-text: #aaaaaa; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--dark-bg); color: var(--light-text); margin: 0; }
        header { background: rgba(0,0,0,0.9); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid #333; box-sizing: border-box; }
        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { color: var(--light-text); text-decoration: none; transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(18,18,18,0.8), rgba(18,18,18,0.8)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?fit=crop&w=1920&q=80') center/cover; }
        .gold-text { color: var(--gold); font-family: 'Playfair Display', serif; }
        section { padding: 80px 50px; max-width: 1200px; margin: 0 auto; }
        .btn { padding: 15px 30px; border: 2px solid var(--gold); color: var(--gold); text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-block; margin-top: 20px; }
        .btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <header>
        <div class="logo" style="font-size: 24px; color: var(--gold); font-weight: bold;">מלודי.</div>
        <nav>
            <ul>
                <li><a href="index.html">בית</a></li>
                <li><a href="reviews.html">ביקורות הלקוחות</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <h1 class="gold-text" style="font-size: 60px;">מסעדת מלודי</h1>
        <p style="font-size: 20px; color: var(--gray-text);">המטבח הסובייטי-רוסי הכי יוקרתי בפתח תקווה</p>
        <a href="reviews.html" class="btn">קראו מה חושבים עלינו</a>
    </div>

    <section id="contact">
        <h2 class="gold-text" style="text-align: center;">בואו לבקר</h2>
        <p style="text-align: center;">בר כוכבא 64, פתח תקווה | טלפון: 054-524-6018</p>
    </section>
</body>
</html>
